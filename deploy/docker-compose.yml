# РУК Коннект — сервер для доступа с разных ПК
# Запуск из каталога deploy: docker compose up -d --build
#
# UI:     http://<IP-сервера>/
# API/WS: http://<IP-сервера>/api  и  ws://<IP-сервера>/ws/...
# Агент:  RUC_BACKEND_BASE_URL=http://<IP-сервера>

name: ruc-connect

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: ruc-connect-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RUC_DATA_DIR: /data
      RUC_CORS_ALLOWED_ORIGINS: ${RUC_CORS_ALLOWED_ORIGINS:-http://localhost}
      RUC_DEMO_PEER_FIRST: ${RUC_DEMO_PEER_FIRST:-111222333}
      RUC_DEMO_PEER_SECOND: ${RUC_DEMO_PEER_SECOND:-444555666}
      RUC_ENGINE_ID_SERVER: ${RUC_ENGINE_ID_SERVER:-127.0.0.1:21116}
      RUC_ENGINE_RELAY: ${RUC_ENGINE_RELAY:-127.0.0.1:21117}
    volumes:
      - ruc-data:/data
    restart: unless-stopped
    networks:
      - ruc-net

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: ruc-connect-web
    ports:
      - "${RUC_HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ruc-net

volumes:
  ruc-data:

networks:
  ruc-net:
