# Локальный ID-сервер и relay для демо (два контейнера из одного образа).
# Запуск из каталога ruc-desktop: docker compose -f docker-compose.engine-relay.yml up -d
# Ключ для клиентов: файл engine-relay-data/id_ed25519.pub (появится после первого старта hbbs).
#
# В каждом клиенте: Настройки → Сеть → ID-сервер = 127.0.0.1:21116 , ключ = содержимое .pub
# Если клиенты на других ПК в ЛВС — замените 127.0.0.1 на IP машины с Docker и в hbbs -r укажите тот же IP:21117

name: ruc-engine-relay

networks:
  engine-net:

services:
  hbbr:
    container_name: ruc-engine-hbbr
    image: ${RUC_ENGINE_RELAY_IMAGE:-ruc/engine-relay:latest}
    command: hbbr
    volumes:
      - ./engine-relay-data:/root
    networks:
      - engine-net
    ports:
      - "21117:21117"
      - "21119:21119"
    restart: unless-stopped

  hbbs:
    container_name: ruc-engine-hbbs
    image: ${RUC_ENGINE_RELAY_IMAGE:-ruc/engine-relay:latest}
    command: hbbs -r ${RUC_ENGINE_RELAY:-127.0.0.1:21117}
    volumes:
      - ./engine-relay-data:/root
    networks:
      - engine-net
    depends_on:
      - hbbr
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    restart: unless-stopped
