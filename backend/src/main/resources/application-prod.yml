server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:${RUC_DATA_DIR:/data}/rucdesktop;DB_CLOSE_DELAY=-1;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ${RUC_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false

app:
  cors:
    allowed-origins: ${RUC_CORS_ALLOWED_ORIGINS:http://localhost}
  demo:
    engine-id-server: ${RUC_ENGINE_ID_SERVER:127.0.0.1:21116}
    engine-relay-address: ${RUC_ENGINE_RELAY:127.0.0.1:21117}

logging:
  level:
    root: info
