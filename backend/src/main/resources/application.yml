server:
  port: 8080

spring:
  application:
    name: ruc-desktop-backend
  datasource:
    url: jdbc:h2:mem:rucdesktop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  websocket:
    max-text-message-size: 8388608
  cors:
    # Dev: http://localhost:5174 . Prod (Docker): set RUC_CORS_ALLOWED_ORIGINS or use nginx same-origin.
    allowed-origins: ${RUC_CORS_ALLOWED_ORIGINS:http://localhost:5174}
  remote:
    # Демо для заказчика: peer в адресной книге = ID в клиенте удалённого доступа (без пробелов).
    # При смене клиента замените шаблон (плейсхолдер {peerId}).
    deep-link-template: "rucconnect://{peerId}"
  demo:
    # Совпадают с ID в клиенте на удалённых машинах (можно задать до первого запуска, пока БД пустая).
    first-peer: ${RUC_DEMO_PEER_FIRST:111222333}
    second-peer: ${RUC_DEMO_PEER_SECOND:444555666}
    # Для клиентов удалённого доступа (см. docker-compose.engine-relay.yml). На другом ПК в ЛВС подставьте IP хоста с Docker.
    engine-id-server: ${RUC_ENGINE_ID_SERVER:127.0.0.1:21116}
    engine-relay-address: ${RUC_ENGINE_RELAY:127.0.0.1:21117}
    engine-key-file-hint: engine-relay-data/id_ed25519.pub

logging:
  level:
    org.hibernate.SQL: warn
