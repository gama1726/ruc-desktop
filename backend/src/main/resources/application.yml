server:
  port: 8080

spring:
  application:
    name: ruc-desktop-backend
  datasource:
    url: jdbc:h2:mem:rucdesktop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  cors:
    allowed-origins: http://localhost:5173
  remote:
    # Пример для RustDesk (уточните формат под ваш клиент / политику ИБ):
    deep-link-template: "rustdesk://rundesktop?id={peerId}"

logging:
  level:
    org.hibernate.SQL: warn
